<!DOCTYPE html>
<html>
<head>
    <title>Movie Reviews</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<h1 class="text-center mb-4">Movie Reviews</h1>

<div class="row mb-4">

<div class="col-md-6">
<a href="/add/" class="btn btn-primary">Add New Review</a>
</div>

<div class="col-md-6">
<form method="GET">
<input type="text" name="q" class="form-control" placeholder="Search movie...">
</form>
</div>

</div>

{% for review in reviews %}

<div class="card mb-3 shadow-sm">
<div class="card-body">

<h4 class="card-title">{{ review.movie_name }}</h4>

<p><strong>Reviewer:</strong> {{ review.reviewer_name }}</p>

<p><strong>Rating:</strong>
{% for i in "1234567890"|slice:":review.rating" %}
⭐
{% endfor %}
</p>

<p>{{ review.review_text }}</p>

<a href="/edit/{{ review.id }}" class="btn btn-warning btn-sm">Edit</a>
<a href="/delete/{{ review.id }}" class="btn btn-danger btn-sm">Delete</a>

</div>
</div>

{% endfor %}

</div>

</body>
</html>
